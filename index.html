<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Organizador da Semana</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow" data-i18n="eyebrow">Minha semana</p>
          <h1 data-i18n="title">Organizador da Semana</h1>
          <p class="subtitle" data-i18n="subtitle">
            Planeje tarefas, acompanhe prioridades e veja seu progresso em um só lugar.
          </p>
        </div>

        <div class="hero-panel">
          <div class="controls">
            <select id="languageSelect" class="language-select" aria-label="Idioma">
              <option value="pt">Português</option>
              <option value="en">English</option>
            </select>

            <button id="themeToggle" class="theme-toggle" type="button" aria-pressed="false">
              Modo escuro
            </button>
          </div>

          <div class="summary" aria-live="polite">
            <span id="doneCount">0</span>
            <small data-i18n="doneLabel">concluídas</small>
          </div>
        </div>
      </section>

      <section class="composer" aria-label="Nova tarefa">
        <input id="taskInput" type="text" placeholder="Adicionar tarefa..." maxlength="80" />
        <select id="dayInput" aria-label="Dia da semana"></select>
        <select id="priorityInput" aria-label="Prioridade"></select>
        <button id="addTask" type="button" data-i18n="addButton">Adicionar</button>
      </section>

      <section class="filters" aria-label="Filtros">
        <button class="filter active" type="button" data-filter="todas" data-i18n="filterAll">Todas</button>
        <button class="filter" type="button" data-filter="hoje" data-i18n="filterToday">Hoje</button>
        <button class="filter" type="button" data-filter="pendentes" data-i18n="filterPending">Pendentes</button>
        <button class="filter" type="button" data-filter="concluidas" data-i18n="filterDone">Concluídas</button>
      </section>

      <section class="week-grid" id="weekGrid" aria-label="Tarefas da semana"></section>
    </main>

    <template id="dayTemplate">
      <article class="day-column">
        <header>
          <h2></h2>
          <span class="task-total"></span>
        </header>
        <div class="task-list"></div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
