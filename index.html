<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Organizador da Semana</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">Minha semana</p>
          <h1>Organizador da Semana</h1>
        </div>
        <div class="topbar-actions">
          <button id="themeToggle" class="theme-toggle" type="button" aria-pressed="false">
            Modo escuro
          </button>
          <div class="summary" aria-live="polite">
            <span id="doneCount">0</span>
            <small>concluídas</small>
          </div>
        </div>
      </section>

      <section class="composer" aria-label="Nova tarefa">
        <input id="taskInput" type="text" placeholder="Adicionar tarefa..." maxlength="80" />
        <select id="dayInput" aria-label="Dia da semana">
          <option value="Segunda">Segunda</option>
          <option value="Terça">Terça</option>
          <option value="Quarta">Quarta</option>
          <option value="Quinta">Quinta</option>
          <option value="Sexta">Sexta</option>
          <option value="Sábado">Sábado</option>
          <option value="Domingo">Domingo</option>
        </select>
        <select id="priorityInput" aria-label="Prioridade">
          <option value="media">Média</option>
          <option value="alta">Alta</option>
          <option value="baixa">Baixa</option>
        </select>
        <button id="addTask" type="button">Adicionar</button>
      </section>

      <section class="filters" aria-label="Filtros">
        <button class="filter active" type="button" data-filter="todas">Todas</button>
        <button class="filter" type="button" data-filter="hoje">Hoje</button>
        <button class="filter" type="button" data-filter="pendentes">Pendentes</button>
        <button class="filter" type="button" data-filter="concluidas">Concluídas</button>
      </section>

      <section class="week-grid" id="weekGrid" aria-label="Tarefas da semana"></section>
    </main>

    <template id="dayTemplate">
      <article class="day-column">
        <header>
          <h2></h2>
          <span class="task-total"></span>
        </header>
        <div class="task-list"></div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
